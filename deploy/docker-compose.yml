# KindBot Face Engine — Docker Compose for Hostinger VPS
#
# Designed to run alongside an existing Traefik reverse proxy
# (e.g. `traefik-ypta`).
#
# CONFIGURATION-PENDING MODE
#   You can `docker compose up -d` with NO env file and the container will
#   still start. /api/health, the kiosk page, and read-only endpoints work.
#   Writes (/api/mode/*, /api/say) return 503 until you set the env vars
#   and re-run `docker compose up -d`.
#
# Required env (in ./.env or shell) for full functionality:
#   KINDBOT_API_TOKEN     Bearer token for /api/mode/* and /api/say
#   KINDBOT_DOMAIN        Public hostname Traefik routes to (e.g. kindbot.example.tld)
#
# Optional env (with defaults):
#   OPENAI_API_KEY        Enables /api/say TTS lip-sync
#   KINDBOT_TTS_MODEL     tts-1 (default) or tts-1-hd
#   KINDBOT_TTS_VOICE     alloy|ash|coral|echo|fable|nova(default)|onyx|sage|shimmer
#   CORS_ORIGINS          comma-separated origins, default *
#   TRAEFIK_NETWORK       external Docker network Traefik is on, default: traefik-ypta
#   TRAEFIK_ENTRYPOINT    Traefik entrypoint name for HTTPS, default: websecure
#   TRAEFIK_CERT_RESOLVER Traefik cert resolver name, default: letsencrypt

services:
  kindbot:
    build: .
    image: kindbot/face-engine:latest
    container_name: kindbot-face
    restart: unless-stopped

    # No host port published — Traefik routes to it on the shared network.
    expose:
      - "8080"

    networks:
      - traefik

    environment:
      # All writes return 503 until KINDBOT_API_TOKEN is set.
      - KINDBOT_API_TOKEN=${KINDBOT_API_TOKEN:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - PORT=8080
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - KINDBOT_TTS_MODEL=${KINDBOT_TTS_MODEL:-tts-1}
      - KINDBOT_TTS_VOICE=${KINDBOT_TTS_VOICE:-nova}

    volumes:
      - ./public/assets/mp4:/app/public/assets/mp4:ro

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-ypta}"

      # Router (HTTPS). If KINDBOT_DOMAIN is unset we default to a placeholder
      # so Traefik silently registers the route but never matches real traffic
      # — once you set KINDBOT_DOMAIN and `docker compose up -d`, routing
      # snaps into place.
      - "traefik.http.routers.kindbot.rule=Host(`${KINDBOT_DOMAIN:-kindbot.unconfigured.local}`)"
      - "traefik.http.routers.kindbot.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.kindbot.tls=true"
      - "traefik.http.routers.kindbot.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"

      # Service
      - "traefik.http.services.kindbot.loadbalancer.server.port=8080"

      # Long-lived connection support (SSE on /api/stream).
      - "traefik.http.routers.kindbot.middlewares=kindbot-headers@docker"
      - "traefik.http.middlewares.kindbot-headers.headers.customResponseHeaders.X-Accel-Buffering=no"

networks:
  traefik:
    name: ${TRAEFIK_NETWORK:-traefik-ypta}
    external: true
